<main class="w-screen h-screen flex flex-col items-center relative">
  <aside class="fixed top-12 left-12 border border-slate-100 rounded-lg p-8">
    @if (client.userId()) {
      <span>Online : {{client.countUsers()}}</span>
    }
  </aside>
  <div class="border border-green-500 w-lg h-full flex gap-12 flex-col justify-end items-stretch">
    @for (message of client.messages(); track message.messageId) {
      <app-post [message]="message" [currentUserId]="client.userId()" />
    }
    <app-create-post />
    @if (client.userId()) {
      <p>{{client.userId()}} is connected</p>
    }
  </div>
</main>
