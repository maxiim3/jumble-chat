<main class="w-screen h-screen flex bg-gradient-to-br from-slate-50 to-slate-100">
  <!-- Sidebar with glass effect -->
  <aside class="fixed top-6 left-6 backdrop-blur-sm bg-white/90 border border-slate-200/50 rounded-2xl p-5 shadow-lg z-10">
    @if (client.userId()) {
      <div class="flex items-center gap-3">
        <div class="relative">
          <div class="w-3 h-3 bg-emerald-500 rounded-full"></div>
          <div class="absolute inset-0 w-3 h-3 bg-emerald-500 rounded-full animate-ping opacity-75"></div>
        </div>
        <span class="text-sm font-medium text-slate-700">{{ client.countUsers() }} online</span>
      </div>
    }
  </aside>

  <!-- Main chat container -->
  <div class="flex-1 flex flex-col max-w-2xl mx-auto w-full h-full py-6 px-4">
    <!-- Messages area -->
    <div class="flex-1 overflow-y-auto flex flex-col gap-3 py-4 px-2">
      @for (message of client.messages(); track message.messageId) {
        <app-post [message]="message" [currentUserId]="client.userId()" />
      }
    </div>

    <!-- Input area card -->
    <div class="bg-white rounded-2xl shadow-lg border border-slate-200/50">
      <app-create-post />
    </div>

    <!-- Connection status -->
    @if (client.userId()) {
      <p class="text-center text-xs text-slate-400 mt-3">Connected as {{ client.userId() }}</p>
    }
  </div>
</main>
