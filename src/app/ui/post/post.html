<article class="w-full p-3 border-slate-100 border">
  @switch (message().type) {
    @case ('new_connection') {
      <span class="text-emerald-600">You joined</span>
    }
    @case ('user_joined') {
      <span class="text-emerald-500">{{ message().userId }} joined</span>
    }
    @case ('user_left') {
      <span class="text-amber-500">{{ message().userId }} left</span>
    }
    @case ('new_message') {
      <span [class]="colorClass()">
        {{ formattedSender() }}: {{ message().message }}
      </span>
    }
  }
</article>
